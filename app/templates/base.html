<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}{{ project_name }}{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- HEADER -->
    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">
                <span class="logo-main">ПРОМ</span>
                <span class="logo-sub">ИНЖИНИРИНГ</span>
            </div>
            <nav class="main-nav">
                <ul class="nav-list" id="navList">
                    <li><a href="/" class="nav-link {% if active_page == 'home' %}active{% endif %}">Главная</a></li>
                    <li><a href="/news" class="nav-link {% if active_page == 'news' %}active{% endif %}">Новости</a></li>
                    <li><a href="/catalog" class="nav-link {% if active_page == 'catalog' %}active{% endif %}">Каталог</a></li>
                    <li><a href="/contacts" class="nav-link {% if active_page == 'contacts' %}active{% endif %}">Контакты</a></li>
                    <li><a href="/about" class="nav-link {% if active_page == 'about' %}active{% endif %}">Компания</a></li>
                </ul>
                <button class="burger" id="burgerBtn" aria-label="Меню">
                    <span></span><span></span><span></span>
                </button>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="main-footer">
        <div class="container footer-center">
            <p>© 2025 {{ project_name }}®. Все права защищены. Сделано в России.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Бургер-меню
        const burgerBtn = document.getElementById('burgerBtn');
        const navList = document.getElementById('navList');

        if (burgerBtn && navList) {
            burgerBtn.addEventListener('click', () => {
                navList.classList.toggle('active');
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ПКФП{% endblock %}</title>
    
    <!-- Bootstrap CSS (для быстрой адаптивной вёрстки) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Наши собственные стили -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- ШАПКА САЙТА (общая для всех страниц) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">{{ project_name }}</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">О компании</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/news">Новости</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/products">Продукция</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ОСНОВНОЕ СОДЕРЖИМОЕ (будет меняться на каждой странице) -->
    <main class="container my-5">
        {% block content %}
        {% endblock %}
    </main>

    <!-- ПОДВАЛ (общий для всех страниц) -->
    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p>&copy; 2024 ПКФП. Все права защищены.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

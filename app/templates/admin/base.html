<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админ-панель{% endblock %} — {{ project_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/admin.css?v=2">
</head>
<body class="admin-body">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin">{{ project_name }} — Админ</a>
            <div class="d-flex align-items-center gap-3">
                {% if librarian %}
                    <span class="text-white-50 small">{{ librarian.username }}</span>
                    <form method="post" action="/admin/logout" class="mb-0">
                        {% include "admin/_csrf.html" %}
                        <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
                    </form>
                {% endif %}
                <a href="/" class="btn btn-outline-light btn-sm" target="_blank">На сайт</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            {% if librarian %}
            <aside class="col-md-3 col-lg-2 admin-sidebar py-4 px-3">
                <nav class="nav flex-column">
                    <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/admin">Обзор</a>
                    <a class="nav-link {% if active_page == 'news' %}active{% endif %}" href="/admin/news">Новости</a>
                    <a class="nav-link {% if active_page == 'categories' %}active{% endif %}" href="/admin/categories">Категории</a>
                    <a class="nav-link {% if active_page == 'products' %}active{% endif %}" href="/admin/products">Товары</a>
                    <a class="nav-link {% if active_page == 'partners' %}active{% endif %}" href="/admin/partners">Партнёры</a>
                </nav>
            </aside>
            <main class="col-md-9 col-lg-10 py-4 px-4">
            {% else %}
            <main class="col-12">
            {% endif %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/admin.js?v=1"></script>
</body>
</html>

{% extends "admin/base.html" %}

{% block title %}{% if partner %}Редактирование{% else %}Новый партнёр{% endif %}{% endblock %}

{% block content %}
<h1 class="h3 mb-4">{% if partner %}Редактирование партнёра{% else %}Новый партнёр{% endif %}</h1>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" action="{% if partner %}/admin/partners/{{ partner.id }}/edit{% else %}/admin/partners/new{% endif %}">
            <div class="row">
                <div class="col-md-8 mb-3">
                    <label for="name" class="form-label">Название</label>
                    <input type="text" class="form-control" id="name" name="name" required maxlength="200"
                           value="{{ partner.name if partner else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="sort_order" class="form-label">Порядок сортировки</label>
                    <input type="number" class="form-control" id="sort_order" name="sort_order" min="0"
                           value="{{ partner.sort_order if partner else 0 }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="logo_url" class="form-label">URL логотипа</label>
                    <input type="url" class="form-control" id="logo_url" name="logo_url"
                           value="{{ partner.logo_url if partner and partner.logo_url else '' }}"
                           placeholder="https://... или /static/...">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="website_url" class="form-label">Сайт партнёра</label>
                    <input type="url" class="form-control" id="website_url" name="website_url"
                           value="{{ partner.website_url if partner and partner.website_url else '' }}"
                           placeholder="https://...">
                </div>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Описание</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ partner.description if partner and partner.description else '' }}</textarea>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="is_published" name="is_published" value="true"
                       {% if not partner or partner.is_published %}checked{% endif %}>
                <label class="form-check-label" for="is_published">Показывать на сайте</label>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/admin/partners" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

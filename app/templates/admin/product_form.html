{% extends "admin/base.html" %}

{% block title %}{% if product %}Редактирование{% else %}Новый товар{% endif %}{% endblock %}

{% block content %}
<h1 class="h3 mb-4">{% if product %}Редактирование товара{% else %}Новый товар{% endif %}</h1>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" action="{% if product %}/admin/products/{{ product.id }}/edit{% else %}/admin/products/new{% endif %}">
            <div class="row">
                <div class="col-md-8 mb-3">
                    <label for="name" class="form-label">Название</label>
                    <input type="text" class="form-control" id="name" name="name" required maxlength="200"
                           value="{{ product.name if product else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="category" class="form-label">Категория</label>
                    <input type="text" class="form-control" id="category" name="category" maxlength="100"
                           value="{{ product.category if product and product.category else '' }}"
                           placeholder="Mennekes, Кабели...">
                </div>
            </div>
            <div class="mb-3">
                <label for="producer" class="form-label">Производитель</label>
                <input type="text" class="form-control" id="producer" name="producer" maxlength="100"
                       value="{{ product.producer if product and product.producer else '' }}">
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Описание</label>
                <textarea class="form-control" id="description" name="description" rows="4">{{ product.description if product and product.description else '' }}</textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="image_url" class="form-label">URL изображения</label>
                    <input type="url" class="form-control" id="image_url" name="image_url"
                           value="{{ product.image_url if product and product.image_url else '' }}"
                           placeholder="https://...">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="pdf_url" class="form-label">URL PDF-каталога</label>
                    <input type="url" class="form-control" id="pdf_url" name="pdf_url"
                           value="{{ product.pdf_url if product and product.pdf_url else '' }}"
                           placeholder="/static/pdf/catalog/...">
                </div>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="is_published" name="is_published" value="true"
                       {% if not product or product.is_published %}checked{% endif %}>
                <label class="form-check-label" for="is_published">Показывать в каталоге</label>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/admin/products" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
